# SubTrack credentials TEMPLATE — safe to commit.
# Copy to `credentials.yaml` and fill in real values. `credentials.yaml` is git-ignored.
postgres:
  host: localhost
  port: 5432
  user: subtrack
  password: "REPLACE_WITH_DB_PASSWORD"
  database: subtrack
valkey:
  host: localhost
  port: 6379
  url: "redis://localhost:6379/0"
mailhog:
  smtp_host: localhost
  smtp_port: 1025
  ui_url: "http://localhost:8025"
backend:
  jwt_secret: "REPLACE_WITH_STRONG_RANDOM_SECRET"
  jwt_algorithm: HS256
  access_token_expire_minutes: 1440
  fernet_key: "REPLACE_WITH_FERNET_KEY"
  secret_key: "REPLACE_WITH_STRONG_RANDOM_SECRET"
google_oauth:
  client_id: "REPLACE_WITH_GOOGLE_CLIENT_ID"
  client_secret: "REPLACE_WITH_GOOGLE_CLIENT_SECRET"
  redirect_uri: "http://localhost:8000/api/auth/google/callback"
sendgrid:
  api_key: "REPLACE_WITH_SENDGRID_API_KEY"
  from_email: "noreply@subtrack.local"
twilio:
  account_sid: "REPLACE_WITH_TWILIO_ACCOUNT_SID"
  auth_token: "REPLACE_WITH_TWILIO_AUTH_TOKEN"
  from_number: "REPLACE_WITH_TWILIO_FROM_NUMBER"
openrouter:
  api_key: "REPLACE_WITH_OPENROUTER_API_KEY"
  model: "openai/gpt-oss-120b:free"
  base_url: "https://openrouter.ai/api/v1"
feature_flags:
  gmail_integration: false
